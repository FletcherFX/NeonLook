<style>
    /* Глубокая темная тема NeonLook */
    :root {
        --bg-color: #03010a;
        --card-bg: rgba(9, 4, 24, 0.75);
        --primary: #9d42ef;
        --accent: #00ffff;
        --text: #f3efff;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
    }

    /* Чистый фон, поверх которого рендерятся холсты */
    body {
        background-color: var(--bg-color);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        position: relative;
    }

    /* Холст интерактивной паутины (на заднем плане) */
    #webCanvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1;
        opacity: 0.6;
    }

    /* Холст взрывающихся искр (на переднем плане) */
    #sparklesCanvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 9999;
    }

    /* Стеклянная карточка интерфейса (Ультра-глассморфизм) */
    .container {
        background: var(--card-bg);
        padding: 50px 40px;
        border-radius: 32px;
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1px solid rgba(157, 66, 239, 0.3);
        box-shadow: 0 30px 70px rgba(0, 0, 0, 0.9), 
                    inset 0 0 30px rgba(157, 66, 239, 0.15);
        width: 100%;
        max-width: 440px;
        text-align: center;
        z-index: 10;
        position: relative;
    }

    h1 {
        font-size: 2.6rem;
        margin-bottom: 6px;
        background: linear-gradient(45deg, #ffffff, #d3adff, var(--accent));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: 2px;
        font-weight: 800;
        filter: drop-shadow(0 2px 15px rgba(157, 66, 239, 0.4));
    }

    p.subtitle {
        color: #7d72a4;
        font-size: 0.9rem;
        margin-bottom: 35px;
        text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
    }

    input {
        width: 100%;
        padding: 18px 24px;
        background: rgba(5, 2, 14, 0.9);
        border: 2px solid rgba(157, 66, 239, 0.4);
        border-radius: 16px;
        color: #fff;
        font-size: 1.2rem;
        outline: none;
        transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        text-align: center;
        letter-spacing: 2px;
    }

    input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 30px rgba(0, 255, 255, 0.3), inset 0 0 10px rgba(0, 255, 255, 0.1);
    }

    button {
        width: 100%;
        padding: 18px;
        margin-top: 20px;
        background: linear-gradient(135deg, var(--primary) 0%, #4c0f82 100%);
        border: none;
        border-radius: 16px;
        color: white;
        font-size: 1.15rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 8px 25px rgba(157, 66, 239, 0.4);
    }

    button:hover {
        background: linear-gradient(135deg, #b25eff 0%, var(--primary) 100%);
        box-shadow: 0 12px 35px rgba(157, 66, 239, 0.65);
    }

    /* Раскрывающийся блок вывода результатов */
    .result-box {
        margin-top: 30px;
        padding: 0;
        max-height: 0;
        overflow: hidden;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.01);
        transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        opacity: 0;
        text-align: left;
    }

    .result-box.active {
        padding: 24px;
        max-height: 280px;
        opacity: 1;
        border: 1px solid rgba(157, 66, 239, 0.25);
        box-shadow: inset 0 0 20px rgba(157, 66, 239, 0.05);
    }

    .result-item { margin-bottom: 14px; font-size: 0.95rem; }
    .result-item:last-child { margin-bottom: 0; }
    .label { color: #8a7fae; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; display: block; }
    .value { color: #fff; font-weight: 600; font-size: 1.05rem; }
    .value.highlight { color: var(--accent); text-shadow: 0 0 15px rgba(0, 255, 255, 0.4); }

    /* Прелоадер */
    .loader {
        display: none;
        width: 28px;
        height: 28px;
        border: 3px solid rgba(255,255,255,0.05);
        border-radius: 50%;
        border-top-color: var(--accent);
        animation: spin 0.8s linear infinite;
        margin: 20px auto 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

    <!-- Холст для интерактивной паутины (задний план) -->
    <canvas id="webCanvas"></canvas>
    <!-- Холст для взрывных искр (передний план) -->
    <canvas id="sparklesCanvas"></canvas>

    <!-- Главный блок NeonLook -->
    <div class="container">
        <h1>⚡ NeonLook</h1>
        <p class="subtitle">Открытый open-source поиск оператора и региона</p>

        <input type="tel" id="phoneInput" placeholder="79991112233" autocomplete="off">
        <button onclick="lookupPhone()">Найти номер</button>
        
        <div class="loader" id="loader"></div>

        <div class="result-box" id="resultBox">
            <div class="result-item">
                <span class="label">Регион регистрации</span>
                <span class="value" id="resRegion">-</span>
            </div>
            <div class="result-item">
                <span class="label">Оператор связи</span>
                <span class="value highlight" id="resOperator">-</span>
            </div>
            <div class="result-item">
                <span class="label">Тип связи / Страна</span>
                <span class="value" id="resType">-</span>
            </div>
        </div>
    </div>
<script>
    // --- 1. ДВИЖОК ИНТЕРАКТИВНОЙ ПАУТИНЫ НА ФОНЕ ---
    const webCanvas = document.getElementById('webCanvas');
    const wCtx = webCanvas.getContext('2d');
    
    let nodes = [];
    const maxNodes = 65; 
    const maxDistance = 120; 
    
    let mouse = { x: null, y: null, radius: 180 }; 

    function resizeWebCanvas() {
        webCanvas.width = window.innerWidth;
        webCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeWebCanvas);
    resizeWebCanvas();

    window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });

    window.addEventListener('mouseleave', () => {
        mouse.x = null;
        mouse.y = null;
    });

    class Node {
        constructor() {
            this.x = Math.random() * webCanvas.width;
            this.y = Math.random() * webCanvas.height;
            this.vx = (Math.random() - 0.5) * 0.7; 
            this.vy = (Math.random() - 0.5) * 0.7;
            this.radius = Math.random() * 2 + 1;
        }
        update() {
            if (this.x < 0 || this.x > webCanvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > webCanvas.height) this.vy *= -1;
            this.x += this.vx;
            this.y += this.vy;

            if (mouse.x !== null && mouse.y !== null) {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < mouse.radius) {
                    let force = (mouse.radius - dist) / mouse.radius;
                    this.x += (dx / dist) * force * 1.5;
                    this.y += (dy / dist) * force * 1.5;
                }
            }
        }
        draw() {
            wCtx.beginPath();
            wCtx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            wCtx.fillStyle = 'rgba(157, 66, 239, 0.4)';
            wCtx.fill();
        }
    }

    function initWeb() {
        nodes = [];
        for (let i = 0; i < maxNodes; i++) nodes.push(new Node());
    }
    initWeb();

    function animateWeb() {
        wCtx.clearRect(0, 0, webCanvas.width, webCanvas.height);
        
        for (let i = 0; i < nodes.length; i++) {
            nodes[i].update();
            nodes[i].draw();
            
            for (let j = i + 1; j < nodes.length; j++) {
                let dx = nodes[i].x - nodes[j].x;
                let dy = nodes[i].y - nodes[j].y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < maxDistance) {
                    wCtx.beginPath();
                    wCtx.moveTo(nodes[i].x, nodes[i].y);
                    wCtx.lineTo(nodes[j].x, nodes[j].y);
                    let alpha = (maxDistance - dist) / maxDistance * 0.15;
                    wCtx.strokeStyle = `rgba(0, 255, 255, ${alpha})`;
                    wCtx.lineWidth = 0.8;
                    wCtx.stroke();
                }
            }
        }
        requestAnimationFrame(animateWeb);
    }
    animateWeb();


    // --- 2. ДВИЖОК НЕОНОВЫХ ИСКР КУРСОРA ---
    const sparklesCanvas = document.getElementById('sparklesCanvas');
    const sCtx = sparklesCanvas.getContext('2d');
    let particles = [];

    function resizeSparklesCanvas() {
        sparklesCanvas.width = window.innerWidth;
        sparklesCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeSparklesCanvas);
    resizeSparklesCanvas();

    class Particle {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.size = Math.random() * 3.5 + 1;
            this.speedX = (Math.random() - 0.5) * 4.5;
            this.speedY = (Math.random() - 0.5) * 4.5;
            this.color = Math.random() > 0.4 ? '#9d42ef' : '#00ffff';
            this.decay = Math.random() * 0.02 + 0.015;
            this.alpha = 1;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.alpha -= this.decay;
            if (this.size > 0.1) this.size -= 0.04;
        }
        draw() {
            sCtx.save();
            sCtx.globalAlpha = this.alpha;
            sCtx.beginPath();
            sCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            sCtx.fillStyle = this.color;
            sCtx.shadowBlur = 12;
            sCtx.shadowColor = this.color;
            sCtx.fill();
            sCtx.restore();
        }
    }

    window.addEventListener('mousemove', (e) => {
        for (let i = 0; i < 4; i++) {
            particles.push(new Particle(e.clientX, e.clientY));
        }
    });

    function handleParticles() {
        sCtx.clearRect(0, 0, sparklesCanvas.width, sparklesCanvas.height);
        for (let i = 0; i < particles.length; i++) {
            particles[i].update();
            particles[i].draw();
            if (particles[i].alpha <= 0) {
                particles.splice(i, 1);
                i--;
            }
        }
        requestAnimationFrame(handleParticles);
    }
    handleParticles();


    // --- 3. КАСКАДНЫЙ СЦЕНАРИЙ ЗАПРОСОВ (ОБХОД CORS ДЛЯ GITHUB PAGES) ---
    async function lookupPhone() {
        const input = document.getElementById('phoneInput').value;
        const cleanPhone = input.replace(/\D/g, ''); 

        if (cleanPhone.length < 10) {
            alert('Пожалуйста, введите полный номер телефона.');
            return;
        }

        const loader = document.getElementById('loader');
        const resultBox = document.getElementById('resultBox');
        
        resultBox.classList.remove('active');
        loader.style.display = 'block';

        // ШЛЮЗ №1: Прямой запрос к виджету ipinfo
        try {
            const response = await fetch(`https://ipinfo.io{cleanPhone}`, {
                headers: { 'Accept': 'application/json' }
            });
            if (!response.ok) throw new Error();
            
            const data = await response.json();
            if (data && data.data) {
                loader.style.display = 'none';
                document.getElementById('resRegion').innerText = data.data.carrier?.context || 'Не определен';
                document.getElementById('resOperator').innerText = data.data.carrier?.name || 'Не определен';
                document.getElementById('resType').innerText = `${data.data.carrier?.type || 'Мобильный'} / ${data.data.country?.name || 'РФ'}`;
                resultBox.classList.add('active');
                return; 
            }
        } catch (e) {
            console.warn('Шлюз 1 заблокирован, пробуем шлюз 2...');
        }

        // ШЛЮЗ №2: Прокси через AllOrigins к реестру num.space
        try {
            const targetUrl = encodeURIComponent(`https://num.space{cleanPhone}`);
            const response = await fetch(`https://allorigins.win{targetUrl}`);
            if (!response.ok) throw new Error();
            
            const wrapper = await response.json();
            const data = JSON.parse(wrapper.contents);

            if (data && data.operator) {
                loader.style.display = 'none';
                document.getElementById('resRegion').innerText = data.region?.name || 'Определен';
                document.getElementById('resOperator').innerText = data.operator?.name || 'Неизвестен';
                document.getElementById('resType').innerText = `Код сети MNP: ${data.operator?.mnc || '—'}`;
                resultBox.classList.add('active');
                return;
            }
        } catch (e) {
            console.warn('Шлюз 2 заблокирован, пробуем шлюз 3...');
        }

        // ШЛЮЗ №3: Прокси через corsproxy.io к реестру num.space
        try {
            const response = await fetch(`https://corsproxy.io{cleanPhone}`);
            if (!response.ok) throw new Error();
            const data = await response.json();
            
            if (data && data.operator) {
                loader.style.display = 'none';
                document.getElementById('resRegion').innerText = data.region?.name || 'Определен';
                document.getElementById('resOperator').innerText = data.operator?.name || 'Неизвестен';
                document.getElementById('resType').innerText = `Код сети MNP: ${data.operator?.mnc || '—'}`;
                resultBox.classList.add('active');
                return;
            }
        } catch (e) {
            console.error('Все открытые шлюзы заблокированы CORS.');
        }

        loader.style.display = 'none';
        alert('Запрос заблокирован защитой браузера (CORS). Сервис будет работать стабильно, если запустить его через расширение Allow CORS или использовать VPN.');
    }

    document.getElementById('phoneInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') lookupPhone();
    });
</script>
</body>
</html>
