<style>
    /* Глубокая темная тема NeonLook */
    :root {
        --bg-color: #04010d;
        --card-bg: rgba(11, 5, 28, 0.7);
        --primary: #9d42ef;
        --accent: #00ffff;
        --text: #f3efff;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
    }

    /* Полностью чистый, глубокий статичный фон */
    body {
        background-color: var(--bg-color);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        position: relative;
    }

    /* Холст для генерации искр */
    #sparklesCanvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 9999;
    }

    /* Стеклянная карточка интерфейса */
    .container {
        background: var(--card-bg);
        padding: 45px 40px;
        border-radius: 32px;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(157, 66, 239, 0.25);
        box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(157, 66, 239, 0.1);
        width: 100%;
        max-width: 440px;
        text-align: center;
        z-index: 10;
        position: relative;
    }

    h1 {
        font-size: 2.5rem;
        margin-bottom: 6px;
        background: linear-gradient(45deg, #ffffff, #d3adff, var(--accent));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: 2px;
        font-weight: 800;
    }

    p.subtitle {
        color: #6e6491;
        font-size: 0.9rem;
        margin-bottom: 35px;
    }

    input {
        width: 100%;
        padding: 18px 24px;
        background: rgba(6, 3, 18, 0.9);
        border: 2px solid rgba(157, 66, 239, 0.35);
        border-radius: 16px;
        color: #fff;
        font-size: 1.15rem;
        outline: none;
        transition: all 0.3s ease;
        text-align: center;
        letter-spacing: 1.5px;
    }

    input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 25px rgba(0, 255, 255, 0.25);
    }

    button {
        width: 100%;
        padding: 18px;
        margin-top: 20px;
        background: linear-gradient(135deg, var(--primary) 0%, #53118c 100%);
        border: none;
        border-radius: 16px;
        color: white;
        font-size: 1.1rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 8px 20px rgba(157, 66, 239, 0.3);
    }

    button:hover {
        background: linear-gradient(135deg, #b25eff 0%, var(--primary) 100%);
        box-shadow: 0 12px 30px rgba(157, 66, 239, 0.5);
    }

    .result-box {
        margin-top: 30px;
        padding: 0;
        max-height: 0;
        overflow: hidden;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.02);
        transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        opacity: 0;
        text-align: left;
    }

    .result-box.active {
        padding: 24px;
        max-height: 260px;
        opacity: 1;
        border: 1px solid rgba(157, 66, 239, 0.2);
    }

    .result-item { margin-bottom: 14px; font-size: 0.95rem; }
    .result-item:last-child { margin-bottom: 0; }
    .label { color: #8e83b3; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; display: block; }
    .value { color: #fff; font-weight: 600; }
    .value.highlight { color: var(--accent); text-shadow: 0 0 10px rgba(0, 255, 255, 0.3); }

    .loader {
        display: none;
        width: 26px;
        height: 26px;
        border: 3px solid rgba(255,255,255,0.05);
        border-radius: 50%;
        border-top-color: var(--accent);
        animation: spin 0.8s linear infinite;
        margin: 20px auto 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
</style>
<canvas id="sparklesCanvas"></canvas>

<div class="container">
    <h1>⚡ NeonLook</h1>
    <p class="subtitle">Открытый open-source поиск оператора и региона</p>

    <input type="tel" id="phoneInput" placeholder="79991112233" autocomplete="off">
    <button onclick="lookupPhone()">Найти номер</button>
    
    <div class="loader" id="loader"></div>

    <div class="result-box" id="resultBox">
        <div class="result-item">
            <span class="label">Регион регистрации</span>
            <span class="value" id="resRegion">-</span>
        </div>
        <div class="result-item">
            <span class="label">Оператор связи</span>
            <span class="value highlight" id="resOperator">-</span>
        </div>
        <div class="result-item">
            <span class="label">Код MNP сети</span>
            <span class="value" id="resMccMnc">-</span>
        </div>
    </div>
</div>

<script>
    // --- ДВИЖОК НЕОНОВЫХ ИСКР КУРСОРA ---
    const canvas = document.getElementById('sparklesCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.size = Math.random() * 3.5 + 1;
            this.speedX = (Math.random() - 0.5) * 4;
            this.speedY = (Math.random() - 0.5) * 4;
            this.color = Math.random() > 0.4 ? '#9d42ef' : '#00ffff';
            this.decay = Math.random() * 0.02 + 0.015;
            this.alpha = 1;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.alpha -= this.decay;
            if (this.size > 0.1) this.size -= 0.04;
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 12;
            ctx.shadowColor = this.color;
            ctx.fill();
            ctx.restore();
        }
    }

    window.addEventListener('mousemove', (e) => {
        // Увеличено количество искр при движении
        for (let i = 0; i < 4; i++) {
            particles.push(new Particle(e.clientX, e.clientY));
        }
    });

    function handleParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < particles.length; i++) {
            particles[i].update();
            particles[i].draw();
            if (particles[i].alpha <= 0) {
                particles.splice(i, 1);
                i--;
            }
        }
        requestAnimationFrame(handleParticles);
    }
    handleParticles();


    // --- ЖЕЛЕЗОБЕТОННЫЙ ЗАПРОС ЧЕРЕЗ АНТИ-CORS ПРОКСИ ---
    async function lookupPhone() {
        const input = document.getElementById('phoneInput').value;
        const cleanPhone = input.replace(/\D/g, ''); 

        if (cleanPhone.length < 10) {
            alert('Пожалуйста, введите полный номер телефона.');
            return;
        }

        const loader = document.getElementById('loader');
        const resultBox = document.getElementById('resultBox');
        
        resultBox.classList.remove('active');
        loader.style.display = 'block';

        try {
            // Маршрутизируем запрос через AllOrigins, чтобы обойти политику CORS на GitHub Pages
            const targetUrl = encodeURIComponent(`https://num.space{cleanPhone}`);
            const response = await fetch(`https://allorigins.win{targetUrl}`);
            const wrapper = await response.json();
            
            // Парсим внутреннее содержимое ответа прокси-сервера
            const data = JSON.parse(wrapper.contents);
            loader.style.display = 'none';

            if (!data || !data.operator) {
                alert('Номер отсутствует в базе данных сотовых операторов.');
                return;
            }

            document.getElementById('resRegion').innerText = data.region?.name || 'Не определен';
            document.getElementById('resOperator').innerText = data.operator?.name || 'Не определен';
            document.getElementById('resMccMnc').innerText = `MCC: ${data.operator?.mcc || '—'} / MNC: ${data.operator?.mnc || '—'}`;

            resultBox.classList.add('active');

        } catch (error) {
            loader.style.display = 'none';
            alert('Не удалось получить данные. Попробуйте ввести номер еще раз.');
            console.error(error);
        }
    }

    document.getElementById('phoneInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') lookupPhone();
    });
</script>
